<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --border: #2a2a3a;
      --snake-head: #4ade80;
      --snake-body: #22c55e;
      --snake-tail: #16a34a;
      --food: #f87171;
      --food-glow: rgba(248,113,113,0.4);
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #4ade80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      user-select: none;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(74,222,128,0.4);
    }

    .stats {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      min-width: 3ch;
      text-align: center;
    }

    .canvas-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(74,222,128,0.06), 0 20px 60px rgba(0,0,0,0.5);
    }

    canvas {
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(13,13,20,0.88);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.2s;
    }

    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(74,222,128,0.5);
    }

    .overlay-score {
      font-size: 1rem;
      color: var(--muted);
    }

    .overlay-score span { color: var(--text); font-weight: 600; }

    .btn {
      margin-top: 8px;
      padding: 12px 32px;
      background: var(--accent);
      color: #0d0d14;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s;
      box-shadow: 0 0 20px rgba(74,222,128,0.3);
    }

    .btn:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(74,222,128,0.5); }
    .btn:active { transform: scale(0.97); }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-direction: column;
      align-items: center;
    }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(3, 44px);
      gap: 4px;
    }

    .dpad-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .dpad-btn:active, .dpad-btn.pressed {
      background: var(--border);
      color: var(--accent);
    }

    .dpad-btn.empty { pointer-events: none; background: transparent; border-color: transparent; }

    .pause-hint {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    @media (min-width: 600px) {
      .controls { display: none; }
    }
  </style>
</head>
<body>

<h1>Snake</h1>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Score</div>
    <div class="stat-value" id="score">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Best</div>
    <div class="stat-value" id="best">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Level</div>
    <div class="stat-value" id="level">1</div>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>

  <div class="overlay" id="startOverlay">
    <div class="overlay-title">Snake</div>
    <div class="overlay-score">Eat food. Don't crash.</div>
    <button class="btn" id="startBtn">Play</button>
    <div class="hint">Arrow keys or WASD to move<br>Space / P to pause</div>
  </div>

  <div class="overlay hidden" id="gameoverOverlay">
    <div class="overlay-title">Game Over</div>
    <div class="overlay-score">Score: <span id="finalScore">0</span> &nbsp;|&nbsp; Best: <span id="finalBest">0</span></div>
    <button class="btn" id="restartBtn">Play Again</button>
  </div>

  <div class="overlay hidden" id="pauseOverlay">
    <div class="overlay-title">Paused</div>
    <button class="btn" id="resumeBtn">Resume</button>
  </div>
</div>

<!-- Mobile d-pad -->
<div class="controls">
  <div class="dpad">
    <div class="dpad-btn empty"></div>
    <div class="dpad-btn" id="btnUp">▲</div>
    <div class="dpad-btn empty"></div>
    <div class="dpad-btn" id="btnLeft">◀</div>
    <div class="dpad-btn empty"></div>
    <div class="dpad-btn" id="btnRight">▶</div>
    <div class="dpad-btn empty"></div>
    <div class="dpad-btn" id="btnDown">▼</div>
    <div class="dpad-btn empty"></div>
  </div>
  <div class="pause-hint">tap center to pause</div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const COLS = 20, ROWS = 20;
let CELL;

function resize() {
  const maxW = Math.min(window.innerWidth - 40, window.innerHeight - 240, 480);
  CELL = Math.floor(maxW / COLS);
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
  if (state !== 'idle') draw();
}
window.addEventListener('resize', resize);
resize();

// Game state
let snake, dir, nextDir, food, score, best = 0, state, loopId, tickMs;

const DIRS = {
  ArrowUp:    {x:0,y:-1}, w:{x:0,y:-1},
  ArrowDown:  {x:0,y:1},  s:{x:0,y:1},
  ArrowLeft:  {x:-1,y:0}, a:{x:-1,y:0},
  ArrowRight: {x:1,y:0},  d:{x:1,y:0},
};

function initGame() {
  const mid = Math.floor(COLS / 2);
  snake = [{x: mid, y: mid}, {x: mid-1, y: mid}, {x: mid-2, y: mid}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  score = 0;
  tickMs = 150;
  placeFood();
  updateUI();
}

function placeFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (occupied.has(`${pos.x},${pos.y}`));
  food = pos;
}

function tick() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame(); return;
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    if (score > best) best = score;
    tickMs = Math.max(60, 150 - Math.floor(score / 50) * 10);
    placeFood();
  } else {
    snake.pop();
  }

  updateUI();
  draw();
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('level').textContent = Math.floor((150 - tickMs) / 10) + 1;
}

// Drawing
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#0d0d14';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.025)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, H); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(W, y*CELL); ctx.stroke();
  }

  // Food glow
  ctx.save();
  ctx.shadowColor = 'rgba(248,113,113,0.8)';
  ctx.shadowBlur = 16;
  ctx.fillStyle = '#f87171';
  const fp = CELL * 0.22;
  const fr = CELL * 0.5 - fp;
  ctx.beginPath();
  ctx.roundRect(food.x*CELL+fp, food.y*CELL+fp, CELL-fp*2, CELL-fp*2, fr * 0.5);
  ctx.fill();
  // Food shine
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(food.x*CELL + CELL*0.35, food.y*CELL + CELL*0.35, CELL*0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Snake
  snake.forEach((seg, i) => {
    const t = i / (snake.length - 1);
    const r = 46 + (22-46)*t, g = 222 + (197-222)*t, b = 128 + (164-128)*t;
    const pad = CELL * 0.1;

    ctx.save();
    if (i === 0) {
      ctx.shadowColor = 'rgba(74,222,128,0.6)';
      ctx.shadowBlur = 14;
    }
    ctx.fillStyle = `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
    const radius = i === 0 ? CELL * 0.35 : CELL * 0.28;
    ctx.beginPath();
    ctx.roundRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, radius);
    ctx.fill();

    // Eyes on head
    if (i === 0) {
      ctx.fillStyle = '#0d0d14';
      const ex = dir.x, ey = dir.y;
      const cx = seg.x*CELL + CELL/2, cy = seg.y*CELL + CELL/2;
      const ew = CELL * 0.09;
      const side = {x: -ey, y: ex};
      const fwd = CELL * 0.18;
      const lat = CELL * 0.14;
      ctx.beginPath();
      ctx.arc(cx + ex*fwd + side.x*lat, cy + ey*fwd + side.y*lat, ew, 0, Math.PI*2);
      ctx.arc(cx + ex*fwd - side.x*lat, cy + ey*fwd - side.y*lat, ew, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });
}

// Game flow
function startGame() {
  initGame();
  state = 'playing';
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameoverOverlay').classList.add('hidden');
  clearInterval(loopId);
  loopId = setInterval(() => { if (state === 'playing') tick(); }, tickMs);
  draw();
}

// Restart with dynamic speed
function restartLoop() {
  clearInterval(loopId);
  loopId = setInterval(() => {
    if (state !== 'playing') return;
    const current = loopId;
    tick();
    // Reschedule at new speed if changed
    if (state === 'playing') {
      clearInterval(current);
      loopId = setInterval(() => { if (state === 'playing') tick(); }, tickMs);
    }
  }, tickMs);
}

// Use adaptive loop
let lastTick = 0;
function gameLoop(ts) {
  if (state !== 'playing') return;
  if (ts - lastTick >= tickMs) {
    lastTick = ts;
    tick();
  }
  if (state === 'playing') requestAnimationFrame(gameLoop);
}

function startGameRAF() {
  initGame();
  state = 'playing';
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameoverOverlay').classList.add('hidden');
  lastTick = 0;
  requestAnimationFrame(gameLoop);
  draw();
}

function endGame() {
  state = 'dead';
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalBest').textContent = best;
  document.getElementById('gameoverOverlay').classList.remove('hidden');
}

function togglePause() {
  if (state === 'playing') {
    state = 'paused';
    document.getElementById('pauseOverlay').classList.remove('hidden');
  } else if (state === 'paused') {
    state = 'playing';
    document.getElementById('pauseOverlay').classList.add('hidden');
    lastTick = performance.now();
    requestAnimationFrame(gameLoop);
  }
}

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
    if (state === 'playing' || state === 'paused') { e.preventDefault(); togglePause(); return; }
  }
  const mapped = DIRS[e.key] || DIRS[e.key.toLowerCase()];
  if (!mapped) return;
  e.preventDefault();
  // Prevent reversing
  if (mapped.x === -dir.x && mapped.y === -dir.y) return;
  nextDir = mapped;
});

// Buttons
document.getElementById('startBtn').addEventListener('click', startGameRAF);
document.getElementById('restartBtn').addEventListener('click', startGameRAF);
document.getElementById('resumeBtn').addEventListener('click', togglePause);

// Mobile d-pad
const dpadMap = {
  btnUp:    {x:0,y:-1}, btnDown:  {x:0,y:1},
  btnLeft:  {x:-1,y:0}, btnRight: {x:1,y:0},
};
Object.entries(dpadMap).forEach(([id, d]) => {
  const btn = document.getElementById(id);
  const press = () => {
    if (state !== 'playing') return;
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 120);
  };
  btn.addEventListener('touchstart', e => { e.preventDefault(); press(); }, {passive:false});
  btn.addEventListener('click', press);
});

// Swipe support
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
}, {passive:true});
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  touchStart = null;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) { togglePause(); return; }
  let d;
  if (Math.abs(dx) > Math.abs(dy)) d = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
  else d = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
  if (d.x === -dir.x && d.y === -dir.y) return;
  nextDir = d;
}, {passive:true});

state = 'idle';
draw();
</script>
</body>
</html>
