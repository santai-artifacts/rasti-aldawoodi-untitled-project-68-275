<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d14;
      --surface: #16161f;
      --border: #2a2a3a;
      --snake-head: #4ade80;
      --snake-body: #22c55e;
      --snake-tail: #16a34a;
      --food: #f87171;
      --food-glow: rgba(248,113,113,0.4);
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #4ade80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 20px;
      user-select: none;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(74,222,128,0.4);
    }

    .stats {
      display: flex;
      gap: 32px;
      align-items: center;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .stat-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .stat-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
      min-width: 3ch;
      text-align: center;
    }

    .canvas-wrap {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--border);
      box-shadow: 0 0 40px rgba(74,222,128,0.06), 0 20px 60px rgba(0,0,0,0.5);
    }

    canvas {
      display: block;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: rgba(13,13,20,0.88);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      transition: opacity 0.2s;
    }

    .overlay.hidden { opacity: 0; pointer-events: none; }

    .overlay-title {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
      text-shadow: 0 0 20px rgba(74,222,128,0.5);
    }

    .overlay-score {
      font-size: 1rem;
      color: var(--muted);
    }

    .overlay-score span { color: var(--text); font-weight: 600; }

    .btn {
      margin-top: 8px;
      padding: 12px 32px;
      background: var(--accent);
      color: #060608;
      font-family: inherit;
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.12s, box-shadow 0.12s, background 0.2s;
      box-shadow: 0 0 20px var(--accent-glow, rgba(74,222,128,0.3));
    }

    .btn:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--accent-glow, rgba(74,222,128,0.5)); }
    .btn:active { transform: scale(0.97); }

    .hint {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
      line-height: 1.6;
    }

    .controls {
      display: flex;
      gap: 8px;
      flex-direction: column;
      align-items: center;
    }

    .dpad {
      display: grid;
      grid-template-columns: repeat(3, 44px);
      grid-template-rows: repeat(3, 44px);
      gap: 4px;
    }

    .dpad-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .dpad-btn:active, .dpad-btn.pressed {
      background: var(--border);
      color: var(--accent);
    }

    .dpad-btn.empty { pointer-events: none; background: transparent; border-color: transparent; }

    .pause-hint {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* Theme picker */
    .theme-picker {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .theme-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .theme-swatches {
      display: flex;
      gap: 8px;
    }

    .swatch {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.15s, border-color 0.15s, box-shadow 0.15s;
      position: relative;
    }

    .swatch::after {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 2px solid transparent;
      transition: border-color 0.15s;
    }

    .swatch:hover { transform: scale(1.15); }

    .swatch.active::after {
      border-color: rgba(255,255,255,0.6);
    }

    @media (min-width: 600px) {
      .controls { display: none; }
    }
  </style>
</head>
<body>

<h1>Snake</h1>

<div class="stats">
  <div class="stat">
    <div class="stat-label">Score</div>
    <div class="stat-value" id="score">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Best</div>
    <div class="stat-value" id="best">0</div>
  </div>
  <div class="stat">
    <div class="stat-label">Level</div>
    <div class="stat-value" id="level">1</div>
  </div>
</div>

<div class="canvas-wrap">
  <canvas id="canvas"></canvas>

  <div class="overlay" id="startOverlay">
    <div class="overlay-title">Snake</div>
    <div class="overlay-score">Eat food. Don't crash.</div>
    <button class="btn" id="startBtn">Play</button>
    <div class="hint">Arrow keys or WASD to move<br>Space / P to pause</div>
  </div>

  <div class="overlay hidden" id="gameoverOverlay">
    <div class="overlay-title">Game Over</div>
    <div class="overlay-score">Score: <span id="finalScore">0</span> &nbsp;|&nbsp; Best: <span id="finalBest">0</span></div>
    <button class="btn" id="restartBtn">Play Again</button>
  </div>

  <div class="overlay hidden" id="pauseOverlay">
    <div class="overlay-title">Paused</div>
    <button class="btn" id="resumeBtn">Resume</button>
  </div>
</div>

<!-- Theme picker -->
<div class="theme-picker">
  <div class="theme-label">Theme</div>
  <div class="theme-swatches" id="swatches"></div>
</div>

<!-- Mobile d-pad -->
<div class="controls">
  <div class="dpad">
    <div class="dpad-btn empty"></div>
    <div class="dpad-btn" id="btnUp">▲</div>
    <div class="dpad-btn empty"></div>
    <div class="dpad-btn" id="btnLeft">◀</div>
    <div class="dpad-btn empty"></div>
    <div class="dpad-btn" id="btnRight">▶</div>
    <div class="dpad-btn empty"></div>
    <div class="dpad-btn" id="btnDown">▼</div>
    <div class="dpad-btn empty"></div>
  </div>
  <div class="pause-hint">tap center to pause</div>
</div>

<script>
// ── Themes ──────────────────────────────────────────────
const THEMES = [
  {
    name: 'Matrix',
    swatch: '#4ade80',
    bg: '#0d0d14',
    grid: 'rgba(255,255,255,0.025)',
    snakeHead: [74, 222, 128],
    snakeTail: [22, 163, 74],
    snakeGlow: 'rgba(74,222,128,0.6)',
    accent: '#4ade80',
    food: '#f87171',
    foodGlow: 'rgba(248,113,113,0.8)',
  },
  {
    name: 'Cyber',
    swatch: '#22d3ee',
    bg: '#060d14',
    grid: 'rgba(34,211,238,0.04)',
    snakeHead: [34, 211, 238],
    snakeTail: [8, 145, 178],
    snakeGlow: 'rgba(34,211,238,0.65)',
    accent: '#22d3ee',
    food: '#e879f9',
    foodGlow: 'rgba(232,121,249,0.8)',
  },
  {
    name: 'Inferno',
    swatch: '#fb923c',
    bg: '#110800',
    grid: 'rgba(251,146,60,0.04)',
    snakeHead: [251, 146, 60],
    snakeTail: [194, 65, 12],
    snakeGlow: 'rgba(251,146,60,0.65)',
    accent: '#fb923c',
    food: '#facc15',
    foodGlow: 'rgba(250,204,21,0.8)',
  },
  {
    name: 'Plasma',
    swatch: '#a78bfa',
    bg: '#0b0714',
    grid: 'rgba(167,139,250,0.04)',
    snakeHead: [167, 139, 250],
    snakeTail: [109, 40, 217],
    snakeGlow: 'rgba(167,139,250,0.65)',
    accent: '#a78bfa',
    food: '#34d399',
    foodGlow: 'rgba(52,211,153,0.8)',
  },
  {
    name: 'Arctic',
    swatch: '#38bdf8',
    bg: '#04111a',
    grid: 'rgba(56,189,248,0.04)',
    snakeHead: [56, 189, 248],
    snakeTail: [14, 116, 144],
    snakeGlow: 'rgba(56,189,248,0.65)',
    accent: '#38bdf8',
    food: '#fb7185',
    foodGlow: 'rgba(251,113,133,0.8)',
  },
];

let theme = THEMES[0];

function applyTheme(t) {
  theme = t;
  document.body.style.background = t.bg;
  document.documentElement.style.setProperty('--accent', t.accent);
  document.documentElement.style.setProperty('--accent-glow', t.snakeGlow);
  document.querySelector('h1').style.color = t.accent;
  document.querySelector('h1').style.textShadow = `0 0 20px ${t.snakeGlow}`;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  document.getElementById('swatch-' + t.name).classList.add('active');
  if (state !== 'idle') draw();
}

// Build swatch buttons
const swatchesEl = document.getElementById('swatches');
THEMES.forEach(t => {
  const s = document.createElement('button');
  s.className = 'swatch' + (t === theme ? ' active' : '');
  s.id = 'swatch-' + t.name;
  s.title = t.name;
  s.style.background = t.swatch;
  s.style.boxShadow = `0 0 10px ${t.swatch}88`;
  s.addEventListener('click', () => applyTheme(t));
  swatchesEl.appendChild(s);
});
// ────────────────────────────────────────────────────────

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const COLS = 20, ROWS = 20;
let CELL;

function resize() {
  const maxW = Math.min(window.innerWidth - 40, window.innerHeight - 240, 480);
  CELL = Math.floor(maxW / COLS);
  canvas.width = COLS * CELL;
  canvas.height = ROWS * CELL;
  if (state !== 'idle') draw();
}
window.addEventListener('resize', resize);
resize();

// Game state
let snake, dir, nextDir, food, score, best = 0, state, loopId, tickMs;
let particles = [], rings = [], scorePopups = [], flashAlpha = 0;
let lastFrame = 0, rafId = null;

const DIRS = {
  ArrowUp:    {x:0,y:-1}, w:{x:0,y:-1},
  ArrowDown:  {x:0,y:1},  s:{x:0,y:1},
  ArrowLeft:  {x:-1,y:0}, a:{x:-1,y:0},
  ArrowRight: {x:1,y:0},  d:{x:1,y:0},
};

function initGame() {
  const mid = Math.floor(COLS / 2);
  snake = [{x: mid, y: mid}, {x: mid-1, y: mid}, {x: mid-2, y: mid}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  score = 0;
  tickMs = 150;
  particles = []; rings = []; scorePopups = []; flashAlpha = 0;
  placeFood();
  updateUI();
}

function placeFood() {
  const occupied = new Set(snake.map(s => `${s.x},${s.y}`));
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)};
  } while (occupied.has(`${pos.x},${pos.y}`));
  food = pos;
}

function tick() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    endGame(); return;
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    endGame(); return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    if (score > best) best = score;
    tickMs = Math.max(60, 150 - Math.floor(score / 50) * 10);
    spawnEatEffects(food.x, food.y);
    placeFood();
  } else {
    snake.pop();
  }

  updateUI();
  // draw() is called by rafLoop every frame
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('level').textContent = Math.floor((150 - tickMs) / 10) + 1;
}

// ── Particle effects ─────────────────────────────────────
function spawnEatEffects(cellX, cellY) {
  const cx = cellX * CELL + CELL / 2;
  const cy = cellY * CELL + CELL / 2;

  // Expanding ring
  rings.push({ x: cx, y: cy, r: CELL * 0.2, alpha: 0.9 });

  // Burst particles
  const count = 20;
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
    const speed = (1.8 + Math.random() * 2.4) * (CELL / 20);
    const life = 0.38 + Math.random() * 0.38;
    particles.push({
      x: cx + (Math.random() - 0.5) * CELL * 0.2,
      y: cy + (Math.random() - 0.5) * CELL * 0.2,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: CELL * (0.07 + Math.random() * 0.1),
      alpha: 1, life, maxLife: life,
      color: theme.food,
    });
  }
  // White sparkles
  for (let i = 0; i < 8; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = (3 + Math.random() * 3) * (CELL / 20);
    const life = 0.22 + Math.random() * 0.18;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      size: CELL * 0.045,
      alpha: 1, life, maxLife: life,
      color: '#ffffff',
    });
  }

  // Score popup
  scorePopups.push({ x: cx, y: cellY * CELL - CELL * 0.1, alpha: 1, life: 0.75, maxLife: 0.75 });

  flashAlpha = 0.07;
}

function updateEffects(dt) {
  const s = dt / 1000;
  flashAlpha = Math.max(0, flashAlpha - s * 3);

  for (let i = rings.length - 1; i >= 0; i--) {
    const rg = rings[i];
    rg.r += CELL * 4.5 * s;
    rg.alpha -= s * 2.8;
    if (rg.alpha <= 0) rings.splice(i, 1);
  }

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life -= s;
    if (p.life <= 0) { particles.splice(i, 1); continue; }
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.09 * (CELL / 20); // gentle gravity
    p.vx *= 0.95; p.vy *= 0.95;
    p.size *= 0.975;
    p.alpha = Math.pow(p.life / p.maxLife, 0.6);
  }

  for (let i = scorePopups.length - 1; i >= 0; i--) {
    const sp = scorePopups[i];
    sp.life -= s;
    if (sp.life <= 0) { scorePopups.splice(i, 1); continue; }
    sp.y -= 1.1 * (CELL / 20);
    sp.alpha = Math.pow(sp.life / sp.maxLife, 0.4);
  }
}

function drawEffects() {
  // Screen flash
  if (flashAlpha > 0) {
    ctx.save();
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = theme.food;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.restore();
  }

  // Rings
  rings.forEach(rg => {
    ctx.save();
    ctx.globalAlpha = rg.alpha;
    ctx.strokeStyle = theme.food;
    ctx.shadowColor = theme.foodGlow;
    ctx.shadowBlur = 12;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(rg.x, rg.y, rg.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  });

  // Particles
  particles.forEach(p => {
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = p.size * 4;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, Math.max(0.5, p.size), 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // "+10" popups
  const fontSize = Math.round(CELL * 0.55);
  ctx.font = `700 ${fontSize}px 'Space Grotesk', sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  scorePopups.forEach(sp => {
    ctx.save();
    ctx.globalAlpha = sp.alpha;
    ctx.shadowColor = theme.food;
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffffff';
    ctx.fillText('+10', sp.x, sp.y);
    ctx.restore();
  });
}
// ─────────────────────────────────────────────────────────

// Drawing
function draw() {
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = theme.bg;
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = theme.grid;
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, H); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y*CELL); ctx.lineTo(W, y*CELL); ctx.stroke();
  }

  // Food glow
  ctx.save();
  ctx.shadowColor = theme.foodGlow;
  ctx.shadowBlur = 16;
  ctx.fillStyle = theme.food;
  const fp = CELL * 0.22;
  const fr = CELL * 0.5 - fp;
  ctx.beginPath();
  ctx.roundRect(food.x*CELL+fp, food.y*CELL+fp, CELL-fp*2, CELL-fp*2, fr * 0.5);
  ctx.fill();
  // Food shine
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.beginPath();
  ctx.arc(food.x*CELL + CELL*0.35, food.y*CELL + CELL*0.35, CELL*0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Snake
  snake.forEach((seg, i) => {
    const frac = snake.length > 1 ? i / (snake.length - 1) : 0;
    const [hr, hg, hb] = theme.snakeHead;
    const [tr, tg, tb] = theme.snakeTail;
    const r = hr + (tr - hr) * frac;
    const g = hg + (tg - hg) * frac;
    const b = hb + (tb - hb) * frac;
    const pad = CELL * 0.1;

    ctx.save();
    if (i === 0) {
      ctx.shadowColor = theme.snakeGlow;
      ctx.shadowBlur = 14;
    }
    ctx.fillStyle = `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
    const radius = i === 0 ? CELL * 0.35 : CELL * 0.28;
    ctx.beginPath();
    ctx.roundRect(seg.x*CELL+pad, seg.y*CELL+pad, CELL-pad*2, CELL-pad*2, radius);
    ctx.fill();

    // Eyes on head
    if (i === 0) {
      ctx.fillStyle = theme.bg;
      const ex = dir.x, ey = dir.y;
      const cx = seg.x*CELL + CELL/2, cy = seg.y*CELL + CELL/2;
      const ew = CELL * 0.09;
      const side = {x: -ey, y: ex};
      const fwd = CELL * 0.18;
      const lat = CELL * 0.14;
      ctx.beginPath();
      ctx.arc(cx + ex*fwd + side.x*lat, cy + ey*fwd + side.y*lat, ew, 0, Math.PI*2);
      ctx.arc(cx + ex*fwd - side.x*lat, cy + ey*fwd - side.y*lat, ew, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.restore();
  });

  drawEffects();
}

// ── Game loop (RAF, always-on) ───────────────────────────
let lastTick = 0;

function rafLoop(ts) {
  rafId = null;
  const dt = Math.min(ts - (lastFrame || ts), 50);
  lastFrame = ts;

  if (state === 'playing' && ts - lastTick >= tickMs) {
    lastTick = ts;
    tick();
  }

  updateEffects(dt);
  draw();

  // Keep looping while playing or effects are still alive
  if (state === 'playing' || particles.length > 0 || rings.length > 0 || scorePopups.length > 0 || flashAlpha > 0) {
    rafId = requestAnimationFrame(rafLoop);
  }
}

function startRaf() {
  if (rafId) cancelAnimationFrame(rafId);
  lastFrame = performance.now();
  lastTick = lastFrame;
  rafId = requestAnimationFrame(rafLoop);
}

function startGameRAF() {
  initGame();
  state = 'playing';
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameoverOverlay').classList.add('hidden');
  startRaf();
}

function endGame() {
  state = 'dead';
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalBest').textContent = best;
  document.getElementById('gameoverOverlay').classList.remove('hidden');
  // rafLoop continues until particles settle
}

function togglePause() {
  if (state === 'playing') {
    state = 'paused';
    document.getElementById('pauseOverlay').classList.remove('hidden');
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  } else if (state === 'paused') {
    state = 'playing';
    document.getElementById('pauseOverlay').classList.add('hidden');
    startRaf();
  }
}
// ─────────────────────────────────────────────────────────

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
    if (state === 'playing' || state === 'paused') { e.preventDefault(); togglePause(); return; }
  }
  const mapped = DIRS[e.key] || DIRS[e.key.toLowerCase()];
  if (!mapped) return;
  e.preventDefault();
  // Prevent reversing
  if (mapped.x === -dir.x && mapped.y === -dir.y) return;
  nextDir = mapped;
});

// Buttons
document.getElementById('startBtn').addEventListener('click', startGameRAF);
document.getElementById('restartBtn').addEventListener('click', startGameRAF);
document.getElementById('resumeBtn').addEventListener('click', togglePause);

// Mobile d-pad
const dpadMap = {
  btnUp:    {x:0,y:-1}, btnDown:  {x:0,y:1},
  btnLeft:  {x:-1,y:0}, btnRight: {x:1,y:0},
};
Object.entries(dpadMap).forEach(([id, d]) => {
  const btn = document.getElementById(id);
  const press = () => {
    if (state !== 'playing') return;
    if (d.x === -dir.x && d.y === -dir.y) return;
    nextDir = d;
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 120);
  };
  btn.addEventListener('touchstart', e => { e.preventDefault(); press(); }, {passive:false});
  btn.addEventListener('click', press);
});

// Swipe support
let touchStart = null;
canvas.addEventListener('touchstart', e => {
  touchStart = {x: e.touches[0].clientX, y: e.touches[0].clientY};
}, {passive:true});
canvas.addEventListener('touchend', e => {
  if (!touchStart) return;
  const dx = e.changedTouches[0].clientX - touchStart.x;
  const dy = e.changedTouches[0].clientY - touchStart.y;
  touchStart = null;
  if (Math.abs(dx) < 10 && Math.abs(dy) < 10) { togglePause(); return; }
  let d;
  if (Math.abs(dx) > Math.abs(dy)) d = dx > 0 ? {x:1,y:0} : {x:-1,y:0};
  else d = dy > 0 ? {x:0,y:1} : {x:0,y:-1};
  if (d.x === -dir.x && d.y === -dir.y) return;
  nextDir = d;
}, {passive:true});

state = 'idle';
draw();
</script>
</body>
</html>
